<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca — Zerion</title>
    <link rel="stylesheet" href="css/busca.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <script src="https://kit.fontawesome.com/ae3ae6f5a4.js" crossorigin="anonymous"></script>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <header>
        <div class="busca-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="input-busca" placeholder="Buscar usuários..." autocomplete="off">
            <button class="btn-limpar" id="btn-limpar" style="display:none;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </header>

    <div class="layout-desktop layout-secundaria">

        <aside class="sidebar-esquerda">
            <div class="sidebar-logo">
                <a href="feed.html"><img src="img/LogoParaMobile.png" alt="Zerion"></a>
            </div>
            <nav class="nav-lateral">
                <a href="feed.html"><i class="fa-solid fa-house"></i><span class="label-nav">Início</span></a>
                <a href="busca.html" class="ativo"><i class="fa-solid fa-magnifying-glass"></i><span class="label-nav">Explorar</span></a>
                <a href="notificacoes.html"><i class="fa-solid fa-bell"></i><span class="label-nav">Notificações</span></a>
                <a href="mensagens.html"><i class="fa-solid fa-message"></i><span class="label-nav">Mensagens</span></a>
                <a href="perfil.html"><i class="fa-solid fa-user-astronaut"></i><span class="label-nav">Perfil</span></a>
            </nav>
            <button class="btn-novo-post btn-logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </aside>

        <main>
            <div class="busca-desktop">
                <div class="busca-bar-desktop">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="input-busca-desktop" placeholder="Buscar usuários..." autocomplete="off">
                </div>
            </div>

            <section id="secao-sugestoes">
                <p class="secao-label">Sugestões</p>
            </section>

            <section id="secao-resultados" style="display:none;">
                <p class="secao-label" id="label-resultados"></p>
                <ul class="lista-usuarios" id="lista-resultados"></ul>
                <p class="sem-resultados" id="sem-resultados" style="display:none;">Nenhum resultado encontrado</p>
            </section>
        </main>

        <aside class="sidebar-direita sidebar-direita-vazia"></aside>

    </div>

    <footer>
        <nav id="navegacao">
            <ul>
                <li><a href="feed.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="notificacoes.html"><i class="fa-solid fa-bell"></i></a></li>
                <li><a href="mensagens.html"><i class="fa-solid fa-message"></i></a></li>
                <li><a href="busca.html"><i class="fa-solid fa-magnifying-glass" style="color:#00f2fe;"></i></a></li>
                <li><a href="perfil.html"><i class="fa-solid fa-user-astronaut"></i></a></li>
            </ul>
        </nav>
    </footer>

    <script src="js/busca.js"></script>
    <script>
        function logout() {
            localStorage.removeItem("usuario");
            window.location.href = "index.html";
        }

        const inputDesktop = document.getElementById("input-busca-desktop");
        const inputMobile  = document.getElementById("input-busca");
        if (inputDesktop && inputMobile) {
            inputDesktop.addEventListener("input", () => {
                inputMobile.value = inputDesktop.value;
                inputMobile.dispatchEvent(new Event("input"));
            });
        }
    </script>
</body>
</html>
