<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificações — Zerion</title>
    <link rel="stylesheet" href="css/notificacoes.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <script src="https://kit.fontawesome.com/ae3ae6f5a4.js" crossorigin="anonymous"></script>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <header>
        <span class="pagina-titulo">Notificações</span>
    </header>

    <div class="layout-desktop layout-secundaria">

        <aside class="sidebar-esquerda">
            <div class="sidebar-logo">
                <a href="feed.html"><img src="img/LogoParaMobile.png" alt="Zerion"></a>
            </div>
            <nav class="nav-lateral">
                <a href="feed.html"><i class="fa-solid fa-house"></i><span class="label-nav">Início</span></a>
                <a href="busca.html"><i class="fa-solid fa-magnifying-glass"></i><span class="label-nav">Explorar</span></a>
                <a href="notificacoes.html" class="ativo">
                    <i class="fa-solid fa-bell"></i>
                    <span class="label-nav">Notificações</span>
                </a>
                <a href="mensagens.html"><i class="fa-solid fa-message"></i><span class="label-nav">Mensagens</span></a>
                <a href="perfil.html"><i class="fa-solid fa-user-astronaut"></i><span class="label-nav">Perfil</span></a>
            </nav>
            <button class="btn-novo-post btn-logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </aside>

        <main>
            <div class="mensagens-header-desktop">
                <span class="pagina-titulo-desktop">Notificações</span>
            </div>
            <ul class="lista-notificacoes" id="lista-notificacoes"></ul>
        </main>

        <aside class="sidebar-direita sidebar-direita-vazia"></aside>

    </div>

    <footer>
        <nav id="navegacao">
            <ul>
                <li><a href="feed.html"><i class="fa-solid fa-house"></i></a></li>
                <li>
                    <a href="notificacoes.html" style="position:relative;">
                        <i class="fa-solid fa-bell" style="color:#00f2fe;"></i>
                        <span class="badge-notif" style="
                            display:none;
                            position:absolute;
                            top:-4px;
                            right:-4px;
                            background:#fa709a;
                            color:white;
                            font-size:0.6rem;
                            width:16px;
                            height:16px;
                            border-radius:50%;
                            align-items:center;
                            justify-content:center;
                            font-family:'Zen Dots',sans-serif;
                        "></span>
                    </a>
                </li>
                <li><a href="mensagens.html"><i class="fa-solid fa-message"></i></a></li>
                <li><a href="busca.html"><i class="fa-solid fa-magnifying-glass"></i></a></li>
                <li><a href="perfil.html"><i class="fa-solid fa-user-astronaut"></i></a></li>
            </ul>
        </nav>
    </footer>

    <script src="js/notificacoes.js"></script>
    <script>
        function logout() {
            localStorage.removeItem("usuario");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
