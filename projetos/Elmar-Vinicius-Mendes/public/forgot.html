<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="img/favicon.ico" type="image/x-icon">
<title>Esqueceu sua senha?</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Zen Dots", sans-serif;
}

html, body {
    width: 100%;
    height: 100%;
}

.galaxy {
    position: fixed;
    inset: 0;
    background-image: url(img/Background.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -1;

    transform: scale(1.05);
}

main {
    width: 100%;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;

    padding-top: 30px;
}

#logo{
    margin-top: 0px;
    
}

#logo h1 {
    margin-top: 15px;
    color: white;
    font-size: 10px;
    text-align: center;

    pointer-events: none;
}

#logo img{
    margin-top: 35px;
    width: 200px;
    height: auto;
    display: block;

    transition: filter 1s ease;
    cursor: default;
}

#logo:hover img {
  filter: drop-shadow(0 0 15px rgb(255, 255, 255));
  cursor: pointer;
}   

.card {
    width: 35%;
    min-width: 300px;

    margin-top: 100px;

    padding: 30px;

    background-image: linear-gradient(to bottom, #3753a6c8 40%, #011526c8);
    border-radius: 10px;

    text-align: center;
    color: white;

    box-shadow: 0px 0px 46px 7px black;
}

.card h1 {
    font-size: 25px;
}

.card h2 {
    margin: 20px 0;
    font-size: 15px;
}

.campo {
    display: flex;
    flex-flow: column nowrap;
    
    align-items: flex-start;

    width: 70%;

    margin: auto;
    padding: 7px;

    text-shadow: 3px 2px 6px rgba(0, 0, 0, 0.593);
}

.campo input {
    width: 100%;

    padding: 8px;

    border-radius: 8px;

    border: 1px solid rgba(255, 255, 255, 0.595);

    background-color: rgba(255, 255, 255, 0.707);

    color: black;

    outline: none;

    transition: 0.3s;

    box-shadow: 7px 5px 27px 0px black;
    
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;

    border: none;
    border-radius: 8px;

    background: linear-gradient(to bottom, #3753a6c8 40%, #123859);
    color: white;

    cursor: pointer;
}

button:hover {
    transform: translateY(-2px);
}

button{
    width: 70%;

    display: block;


    margin: auto;
    margin-top: 40px;

    padding: 12px;

    border: none;
    border-radius: 8px;

    background: linear-gradient(to bottom, #3753a6c8 40%, #123859);

    color: white;

    font-size: 15px;
    font-weight: bold;

    cursor: pointer;

    transition: 0.3s;

}

button:hover{
    transform: scale(1.01);
    transform: translateY(-2px);

    box-shadow: 0px 0px 15px rgba(123, 92, 255, 0.6);
}

</style>
</head>

<body>

<div class="galaxy"></div>

<main>

    <div id="logo">
        <a href="index.html"><img src="img/LogoParaMobile.png" alt=""></a>
        <h1>Compartilhe seu universo.</h1>
    </div>

    <div class="card">
        <h1>Esqueceu sua senha?</h1>
        <h2>Digite seu e-mail para recuperar sua senha</h2>

        <form class="campo">
            <input type="email" placeholder="Seu e-mail" required>
            <button type="submit">Enviar</button>
        </form>
    </div>

</main>

</body>
</html>
