<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

    <h1>Login</h1>

    <input
        type="email"
        id="email"
        placeholder="Email">

    <br><br>

    <input
        type="password"
        id="senha"
        placeholder="Senha">

    <br><br>

    <button onclick="login()">
        Entrar
    </button>

    <p>
        Não possui conta?
        <a href="registro.html">
            Registrar
        </a>
    </p>

    <script src="login.js"></script>

</body>
</html>
