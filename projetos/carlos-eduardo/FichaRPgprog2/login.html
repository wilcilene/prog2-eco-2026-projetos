<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="auth.css">
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>⚔ RPG Manager ⚔</h1>

            <h2>Entrar</h2>

            <input
                type="email"
                id="email"
                placeholder="Email">

            <input
                type="password"
                id="senha"
                placeholder="Senha">

            <button onclick="login()">
                Entrar
            </button>

            <p>

                Não possui conta?

                <a href="registro.html">
                    Registrar
                </a>

            </p>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
