<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="auth.css">
    <meta charset="UTF-8">
    <title>Registro</title>
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>⚔ RPG Manager ⚔</h1>

            <h2>Criar Conta</h2>

            <input
                type="text"
                id="nome"
                placeholder="Nome">

            <input
                type="email"
                id="email"
                placeholder="Email">

            <input
                type="password"
                id="senha"
                placeholder="Senha">

            <button onclick="registrar()">
                Registrar
            </button>

            <p>

                Já possui conta?

                <a href="login.html">
                    Fazer login
                </a>

            </p>

        </div>

    </div>

    <script src="registro.js"></script>

</body>
</html>
