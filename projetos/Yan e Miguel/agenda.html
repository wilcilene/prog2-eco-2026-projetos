<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda - RaceHub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">🏁 RaceHub</div>

<nav>
<a href="index.html">Home</a>
</nav>

</header>

<div class="hero">

    <h1>Agenda da Pista</h1>

    <div class="agenda-box">

        <h2>Selecionar Data</h2>

        <input
            type="date"
            id="dataReserva">

        <h2>Selecionar Horário</h2>

        <select id="horario">

            <option>08:00</option>
            <option>10:00</option>
            <option>12:00</option>
            <option>14:00</option>
            <option>16:00</option>
            <option>18:00</option>

        </select>

        <button
            class="btn-principal"
            onclick="reservarData()">

            Reservar

        </button>

        <h3 id="resultadoAgenda"></h3>

    </div>

</div>

</body>
</html>
<script>

function reservarData(){

    const data =
        document.getElementById("dataReserva").value;

    if(data === ""){
        alert("Selecione uma data");
        return;
    }

    document
        .getElementById("resultadoAgenda")
        .innerHTML =
            `✅ Reserva realizada para ${data}`;

}

</script>
<script>

let reservas = [];

function reservarData(){

    const data =
        document.getElementById("dataReserva").value;

    const horario =
        document.getElementById("horario").value;

    const reserva =
        `${data} ${horario}`;

    if(reservas.includes(reserva)){

        alert("Horário indisponível");

        return;
    }

    reservas.push(reserva);

    document
        .getElementById("resultadoAgenda")
        .innerHTML =

        `✅ Reserva confirmada<br>${data} às ${horario}`;
}

</script>
