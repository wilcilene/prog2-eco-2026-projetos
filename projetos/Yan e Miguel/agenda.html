```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agenda - RaceHub</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">
        🏁 RaceHub
    </div>

    <nav>

        <a href="index.html">
            Home
        </a>

        <a href="cliente.html">
            Dashboard
        </a>

    </nav>

</header>

<div class="hero">

    <h1>Agenda da Pista</h1>

    <div class="agenda-box">

        <h2>Selecionar Data</h2>

        <input
            type="date"
            id="dataReserva">

        <h2>Selecionar Horário</h2>

        <select id="horario">

            <option>08:00</option>
            <option>10:00</option>
            <option>12:00</option>
            <option>14:00</option>
            <option>16:00</option>
            <option>18:00</option>

        </select>

        <button
            class="btn-principal"
            onclick="reservarData()">

            Reservar

        </button>

        <h3 id="resultadoAgenda"></h3>

        <div id="listaReservas"></div>

    </div>

</div>

<script src="database.js"></script>

<script>

function reservarData(){

    const data =
        document.getElementById("dataReserva").value;

    const horario =
        document.getElementById("horario").value;

    if(data === ""){

        alert("Selecione uma data");

        return;
    }

    const reservas = obterReservas();

    reservas.push({

        data: data,

        horario: horario

    });

    salvarReservas(reservas);

    document.getElementById("resultadoAgenda")
        .innerHTML =

        `✅ Reserva realizada para ${data} às ${horario}`;

    carregarReservas();
}

function carregarReservas(){

    const reservas = obterReservas();

    let html = "";

    reservas.forEach(r => {

        html += `

        <div class="corrida-card">

            <h3>📅 ${r.data}</h3>

            <p>Horário: ${r.horario}</p>

        </div>

        `;
    });

    document
        .getElementById("listaReservas")
        .innerHTML = html;
}

carregarReservas();

</script>

</body>

</html>
```
