<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Pilotos</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
🏁 RaceHub
</div>

</header>

<div class="hero">

<h1>Pilotos Cadastrados</h1>

<div class="corrida-container">

<input
id="nomePiloto"
placeholder="Nome do Piloto">

<button
class="btn-principal"
onclick="cadastrarPiloto()">

Cadastrar

</button>

</div>

<div id="listaPilotos"></div>

</div>

<script src="database.js"></script>

<script>

function cadastrarPiloto(){

    const nome =
        document.getElementById("nomePiloto").value;

    if(nome === "") return;

    const pilotos =
        obterPilotos();

    pilotos.push({
        nome
    });

    salvarPilotos(pilotos);

    atualizarPilotos();
}

function atualizarPilotos(){

    const pilotos =
        obterPilotos();

    let html = "";

    pilotos.forEach(p => {

        html += `

        <div class="corrida-card">

            <h2>${p.nome}</h2>

        </div>

        `;
    });

    document
        .getElementById("listaPilotos")
        .innerHTML = html;
}

atualizarPilotos();

</script>

</body>

</html>
