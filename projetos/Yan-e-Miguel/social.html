<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceHub | Social</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div>
                <div class="rh-logo">
                    <h1>RaceHub</h1>
                    <span>Driver Network</span>
                </div>
                <div class="divider"></div>

                <!-- O menu é preenchido pelo JS conforme o perfil logado. -->
                <nav class="menu" id="sidebarMenu"></nav>
            </div>

            <div>
                <button class="btn btn-secondary" onclick="logout()" style="width:100%;">
                    <i class="bi bi-box-arrow-left"></i>
                    Sair
                </button>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div>
                    <strong data-user-greeting>Bem-vindo</strong>
                    <p style="margin-top:4px;">Rede social de pilotos e estatísticas públicas</p>
                </div>

                <div class="dashboard-user">
                    <div>
                        <strong data-user-name>Usuário</strong>
                        <p data-user-role>Perfil</p>
                    </div>
                    <div class="avatar" data-user-avatar>RH</div>
                </div>
            </header>

            <section class="page">
                <div class="page-header">
                    <div class="page-title">
                        <h1>Social RaceHub</h1>
                        <p>Compare pilotos, veja veículos cadastrados, inscrições e melhores tempos.</p>
                    </div>

                    <button class="btn btn-secondary" onclick="window.location.href='relatorios.html'">
                        <i class="bi bi-bar-chart"></i>
                        Ver rankings
                    </button>
                </div>

                <section class="panel">
                    <div class="panel-header flex-between">
                        <div>
                            <h2>Pilotos da comunidade</h2>
                            <p style="margin-top:8px;">Cards públicos com estatísticas resumidas de cada piloto.</p>
                        </div>

                        <div class="search">
                            <i class="bi bi-search"></i>
                            <input type="text" id="buscaSocial" placeholder="Buscar piloto..." oninput="filtrarPilotosSociais()">
                        </div>
                    </div>

                    <div class="panel-body">
                        <div class="social-grid" id="listaPilotosSociais">
                            <div class="alert alert-danger">Carregando pilotos...</div>
                        </div>
                    </div>
                </section>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="js/social.js"></script>
</body>
</html>
